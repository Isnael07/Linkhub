
reviews:
  profile: assertive
  review_status: true
  request_changes_workflow: true
  high_level_summary: true
  collapse_walkthrough: true
  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - main
      - dev

path_filters:
  include:
    - "src/**"
  exclude:
    - "**/target/**"
    - "**/build/**"
    - "**/.github/**"
    - "**/*.md"

language_rules:
  java:
    enabled: true
    focus:
      - security
      - null_safety
      - spring
      - performance
      - concurrency
      - exception_handling

chat:
  auto_reply: true
