spring:
  application:
    name: mylinks

  datasource:
    url: jdbc:postgresql://localhost:5432/mydatabase
    username: myuser
    password: secret
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

jwt:
  private:
    key: classpath:app.key
  public:
    key: classpath:app.pub

springdoc:
  swagger-ui:
    path: /swagger
  api-docs:
    path: /api-docs

