spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/mydatabase
    username: myuser
    password: secret
    driver-class-name: org.postgresql.Driver

    jpa:
      hibernate:
        ddl-auto: validate
      show-sql: true
      properties:
        hibernate:
          dialect: org.hibernate.dialect.PostgreSQLDialect
          format_sql: true

    flyway:
      enabled: true
      locations: classpath:db/migration

jwt:
  private:
    key: classpath:app.key
  public:
    key: classpath:app.pub

springdoc:
  swagger-ui:
    path: /swagger
  api-docs:
    path: /api-docs

